name: Sync upstream to nova

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-to-nova
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout nova
        uses: actions/checkout@v4
        with:
          ref: nova
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/Xnick417x/winlator-nightly-wcp.git
          git fetch upstream main --prune

      - name: Merge upstream/main into nova
        run: |
          git merge --no-edit --no-ff upstream/main

      - name: Push nova
        run: |
          git push origin HEAD:nova
